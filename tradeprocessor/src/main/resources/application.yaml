spring:
  application:
    name: tradeprocessor
  datasource:
    url: jdbc:postgresql://localhost:5432/trade_ledger
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update  # TODO: alterar para none quando pronto
  kafka:
    bootstrap-servers: 'http://localhost:29092'
    consumer:
      group-id: trade-processor-trade-data
      auto-offset-reset: earliest


tradeledger:
  config:
    kafka:
      server-url: 'http://localhost:29092'
      topics:
        market-data: 'trade.market-data'